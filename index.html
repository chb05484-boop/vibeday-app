<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeDay - Final Version</title>
<style>
/* --- BASE STYLES --- */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f0ff;color:#2d2360;min-height:100vh}
:root{--accent:#7F77DD;--card:#fff;--border:#e0d8f8;--sub:#9b8ec4;--bg2:#ede8ff;--input:#faf8ff}

/* --- LAYOUT --- */
.layout{display:grid;grid-template-columns:280px 1fr;min-height:100vh;gap:0}
.sidebar{background:#2d2360;color:#fff;padding:1.5rem 1rem;display:flex;flex-direction:column;gap:1rem}
.main{padding:1.5rem;overflow-y:auto}

/* --- SIDEBAR COMPONENTS --- */
.s-logo{font-size:22px;font-weight:bold;margin-bottom:.5rem}.s-logo span{color:#b197fc}
.s-section{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#9b8ec4;margin-bottom:6px;margin-top:.5rem}
.s-week{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:.5rem}
.s-day{background:#3d3380;border-radius:8px;padding:5px 2px;text-align:center;cursor:pointer;transition:.15s}
.s-day:hover{background:#534AB7}.s-day.today{background:var(--accent)}
.s-day-name{font-size:9px;color:#c4b8f8}.s-day-num{font-size:13px;font-weight:bold}

.s-add{display:flex;flex-direction:column;gap:6px}
.s-add input, .s-add select{padding:7px 10px;border:1px solid #534AB7;border-radius:8px;font-size:13px;background:#3d3380;color:#fff;width:100%}
.s-add button{padding:8px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold}

.pace-card{background:#3d3380;border-radius:12px;padding:12px;margin-bottom:.5rem}
.pace-label{font-size:12px;color:#c4b8f8;margin-bottom:8px}
.pace-bar-wrap{background:#2d2360;border-radius:20px;height:14px;overflow:hidden;margin-bottom:6px}
.pace-bar{height:100%;border-radius:20px;transition:width .5s,background .5s}
.pace-text{font-size:13px;font-weight:bold}

.video-timer{background:#3d3380;border-radius:12px;padding:10px 14px;font-size:13px;color:#c4b8f8;text-align:center}

/* --- MAIN AREA COMPONENTS --- */
.page-title{font-size:20px;font-weight:bold;color:#2d2360;margin-bottom:1rem}
.week-tasks{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:1.5rem}
.day-col{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px;min-height:80px}
.day-col-name{font-size:11px;font-weight:bold;color:var(--sub);margin-bottom:6px;text-align:center}
.day-col.today-col{border:2px solid var(--accent);background:#faf8ff}

.mini-task{font-size:11px;background:var(--bg2);border-radius:6px;padding:3px 6px;margin-bottom:3px;cursor:pointer;color:#2d2360}
.mini-task.red{background:#fff0f0;color:#c0392b}
.mini-task.amber{background:#fffbe6;color:#b7770a}

/* --- TASK CARDS & AI CHAT --- */
.task-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:12px;cursor:pointer;transition:.2s}
.task-card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(127,119,221,.15)}
.task-card.open{border-color:var(--accent);box-shadow:0 4px 20px rgba(127,119,221,.2)}
.tc-top{display:flex;align-items:center;justify-content:space-between}
.tc-title{font-size:16px;font-weight:bold;color:#2d2360}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:bold}
.red-b{background:#fff0f0;color:#c0392b}.amber-b{background:#fffbe6;color:#b7770a}.green-b{background:#f0fff4;color:#2e7d32}
.tc-meta{font-size:12px;color:var(--sub);margin-top:4px}
.tc-body{display:none;margin-top:1rem;border-top:1px solid var(--border);padding-top:1rem}
.tc-body.open{display:block}

/* AI Integrated Header */
.ai-chat-header {display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.ai-chat-icon {width:30px;height:30px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:bold}
.ai-chat-name {font-size:13px;font-weight:bold;color:var(--accent)}

.chat-box{background:var(--bg2);border-radius:12px;padding:10px;max-height:220px;overflow-y:auto;margin-bottom:8px}
.chat-bubble{background:#fff;border-radius:10px;padding:8px 12px;margin-bottom:6px;font-size:13px;max-width:85%}
.chat-me{background:var(--accent);color:#fff;border-radius:10px;padding:8px 12px;margin-bottom:6px;font-size:13px;margin-left:auto;max-width:85%}
.chat-input{display:flex;gap:6px}
.chat-input input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--input);color:#2d2360}

/* --- BUTTONS & TIMERS --- */
.task-timer{display:flex;align-items:center;gap:12px;margin-bottom:1rem}
.t-circle{width:70px;height:70px;border-radius:50%;border:4px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;background:#faf8ff;flex-shrink:0}
.t-num{font-size:18px;font-weight:bold;color:#2d2360}
.t-lbl{font-size:9px;color:var(--sub)}
.btn{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold}
.btn2{padding:7px 12px;background:var(--card);color:#2d2360;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px}
.done-btn{width:100%;padding:14px;background:linear-gradient(135deg,#7F77DD,#534AB7);color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:15px;font-weight:bold;margin-top:8px}

.music-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.m-chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-size:12px;cursor:pointer;background:var(--card);color:var(--sub)}
.m-chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}

.upload-area{border:2px dashed var(--border);border-radius:12px;padding:1rem;text-align:center;margin-bottom:1rem;cursor:pointer}

/* --- BANNERS & OVERLAYS --- */
.banner{border-radius:14px;padding:12px 16px;text-align:center;font-size:14px;font-weight:bold;margin-bottom:12px;display:none;align-items:center;justify-content:space-between}
.banner.show{display:flex}
.banner-close{background:rgba(255,255,255,.3);border:none;border-radius:8px;padding:4px 10px;color:#fff;cursor:pointer}
.sleep-b{background:#2d2360;color:#fff}
.break-b{background:#1D9E75;color:#fff}
.video-b{background:#D85A30;color:#fff}

#victory{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200}
#victory.show{display:flex}
.v-box{background:#fff;border-radius:24px;padding:2rem;text-align:center;max-width:300px}
.v-emoji{font-size:56px;margin-bottom:10px}

@media(max-width:600px){.layout{grid-template-columns:1fr}.sidebar{padding:1rem}.week-tasks{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<div class="layout">

  <div class="sidebar">
    <div class="s-logo">Vibe<span>Day</span></div>

    <div class="pace-card">
      <div class="pace-label">קצב כללי</div>
      <div class="pace-bar-wrap"><div class="pace-bar" id="pacebar" style="width:70%;background:#2ecc71"></div></div>
      <div class="pace-text" id="pacetext" style="color:#2ecc71">טוב! אתה בקצב</div>
    </div>

    <div>
      <div class="s-section">השבוע</div>
      <div class="s-week" id="sweek"></div>
    </div>

    <div>
      <div class="s-section">הוסיפי משימה</div>
      <div class="s-add">
        <input id="new-title" placeholder="שם המשימה"/>
        <select id="new-day">
          <option value="0">ראשון</option><option value="1">שני</option><option value="2">שלישי</option>
          <option value="3">רביעי</option><option value="4">חמישי</option><option value="5">שישי</option><option value="6">שבת</option>
        </select>
        <select id="new-pri">
          <option value="red-b">דחוף</option><option value="amber-b">בקרוב</option><option value="green-b">בסדר</option>
        </select>
        <input id="new-subject" placeholder="מקצוע (C++, אינפי...)"/>
        <button onclick="addTask()">+ הוסיפי</button>
      </div>
    </div>

    <div>
      <div class="s-section">סרטונים היום</div>
      <div class="video-timer" id="video-counter">נשארו 30 דקות</div>
    </div>

    <div>
      <div class="s-section">נגן רקע</div>
      <div style="border-radius:12px; overflow:hidden; border:1px solid #534AB7; background:#000; height:120px;">
        <iframe id="main-yt-player" width="100%" height="120" src="https://www.youtube.com/embed/jfKfPfyJRdk" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
      </div>
    </div>
    
    <button style="background:transparent; border:1px solid #534AB7; color:#9b8ec4; padding:8px; border-radius:8px; cursor:pointer; font-size:11px; margin-top:auto;" onclick="clearData()">איפוס נתונים</button>
  </div>

  <div class="main">
    <div class="banner sleep-b" id="sleep-b">
      <span>זמן לישון! 22:30 — הגוף שלך צריך מנוחה 🌙</span>
      <button class="banner-close" onclick="this.closest('.banner').classList.remove('show')">סגור</button>
    </div>
    <div class="banner break-b" id="break-b">
      <span id="break-msg">הפסקה! קומי, שתי מים, תתמתחי 💧</span>
      <button class="banner-close" onclick="breakReply()">כן!</button>
    </div>
    <div class="banner video-b" id="video-b">
      <span>בא לך לראות סרטון כיפי?</span>
      <div style="display:flex;gap:6px" id="video-actions">
        </div>
    </div>

    <div class="page-title">המשימות שלי השבוע</div>
    <div class="week-tasks" id="week-grid"></div>
    <div id="task-list"></div>
  </div>
</div>

<div id="victory">
  <div class="v-box">
    <div class="v-emoji">🎉</div>
    <div class="v-title">כל הכבוד!</div>
    <div class="v-sub">סיימת משימה! +50 XP</div>
    <button class="v-close" onclick="closeVictory()">המשך!</button>
  </div>
</div>

<script>
const DAYS=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const today=new Date().getDay();
let videoMins=30;
let tasks=[];
let activeTimer=null,timerSecs=0,timerRunning=false;

const ytLinks = {
  'Lo-fi': 'https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1',
  'Jazz': 'https://www.youtube.com/embed/Dx5qFachd3A?autoplay=1',
  'טבע': 'https://www.youtube.com/embed/eKFTSSKCzWA?autoplay=1',
  'Classical': 'https://www.youtube.com/embed/mIYzp5rcTvU?autoplay=1',
  'Focus': 'https://www.youtube.com/embed/4xDzrrm1vbc?autoplay=1'
};

const funVideoCategories = [
  { label: "קוד וצחוק", msg: "בא לך לראות אתגר תכנות מצחיק ב-C++?", link: "https://www.youtube.com/results?search_query=coding+challenges+fun" },
  { label: "מוזיקת אנרגיה", msg: "זמן לסרטון עם מקצבים לאנרגיה?", link: "https://www.youtube.com/results?search_query=upbeat+instrumental+rhythmic+music" },
  { label: "טיפ לפרודוקטיביות", msg: "איך ללמוד במינימום זמן? סרטון קצר שיעזור לך.", link: "https://www.youtube.com/results?search_query=productivity+tips+for+cs+students" }
];

/* --- LOGIC & STORAGE --- */

function loadData() {
  try {
    const saved = localStorage.getItem('vibeDayFinalTasks');
    tasks = saved ? JSON.parse(saved) : [
      {title:'תרגיל C++ — destructor',day:1,pri:'red-b',subject:'C++',done:false},
      {title:'תרגיל אינפי — גבולות',day:3,pri:'red-b',subject:'אינפי',done:false}
    ];
    videoMins = parseInt(localStorage.getItem('vibeDayFinalVideo') || "30");
  } catch(e) { console.warn("Storage blocked."); }
  updateVideoUI();
}

function saveData() {
  try {
    localStorage.setItem('vibeDayFinalTasks', JSON.stringify(tasks));
    localStorage.setItem('vibeDayFinalVideo', videoMins);
  } catch(e) {}
}

function init() {
  loadData();
  if ("Notification" in window && Notification.permission !== "denied") Notification.requestPermission();
  buildWeekHeader();
  buildWeekGrid();
  renderTasks();
  updatePace();
  checkSleepLoop();
  scheduleBreaks();
  scheduleVideoSuggest();
}

/* --- UI BUILDERS --- */

function buildWeekHeader(){
  const sw=document.getElementById('sweek');
  sw.innerHTML='';
  DAYS.forEach((d,i)=>{
    const el=document.createElement('div');
    el.className='s-day'+(i===today?' today':'');
    el.innerHTML=`<div class="s-day-name">${d.slice(0,2)}</div><div class="s-day-num">${i+1}</div>`;
    sw.appendChild(el);
  });
}

function buildWeekGrid(){
  const grid=document.getElementById('week-grid');
  grid.innerHTML='';
  DAYS.forEach((d,i)=>{
    const col=document.createElement('div');
    col.className='day-col'+(i===today?' today-col':'');
    col.innerHTML=`<div class="day-col-name">${d.slice(0,2)}</div>`;
    tasks.filter(t=>t.day===i&&!t.done).forEach(t=>{
      const mt=document.createElement('div');
      mt.className=`mini-task ${t.pri==='red-b'?'red':t.pri==='amber-b'?'amber':''}`;
      mt.textContent=t.title.length>14?t.title.slice(0,13)+'…':t.title;
      mt.onclick=()=>scrollToTask(t.title);
      col.appendChild(mt);
    });
    grid.appendChild(col);
  });
}

function renderTasks(){
  const list=document.getElementById('task-list');
  list.innerHTML='';
  tasks.filter(t=>!t.done).forEach((t,idx)=>{
    const card=document.createElement('div');
    card.className='task-card';
    card.innerHTML=`
      <div class="tc-top" onclick="toggleTask(this)">
        <div><div class="tc-title">${t.title}</div><div class="tc-meta">${t.subject} · ${DAYS[t.day]}</div></div>
        <span class="badge ${t.pri}">${t.pri==='red-b'?'דחוף':'בקרוב'}</span>
      </div>
      <div class="tc-body">
        <div class="task-timer">
          <div class="t-circle"><div class="t-num" data-timer>25:00</div><div class="t-lbl">טיימר</div></div>
          <div class="t-btns"><button class="btn" onclick="startTaskTimer(this)">התחילי</button><button class="btn2" onclick="resetTaskTimer(this)">איפוס</button></div>
        </div>
        <div class="music-row">${getMusicOptions(t.subject)}</div>
        <div class="upload-area" onclick="this.querySelector('input').click()">
          <input type="file" onchange="fileUploaded(this)" style="display:none"/><div class="upload-label">העלי קובץ/שאלה 📂</div>
        </div>
        <div class="chat-box" id="chat-${idx}">
          <div class="ai-chat-header"><div class="ai-chat-icon">G</div><div class="ai-chat-name">העוזר האישי שלך</div></div>
          <div class="chat-bubble">היי חנה! אני כאן לעזור עם ${t.subject}. מה נפתור עכשיו?</div>
        </div>
        <div class="chat-input">
          <input placeholder="שאלי אותי..." onkeydown="if(event.key==='Enter')sendChat(this,'${idx}')"/><button class="btn" onclick="sendChat(this.previousElementSibling,'${idx}')">שלח</button>
        </div>
        <button class="done-btn" onclick="doneTask('${t.title.replace(/'/g,"\\'")}',this)">סיימתי! 🎉</button>
      </div>`;
    list.appendChild(card);
  });
}

/* --- ACTIONS --- */

function addTask(){
  const title=document.getElementById('new-title').value.trim();
  if(!title) { alert("שימי לב: אי אפשר להוסיף משימה בלי שם 😊"); return; }
  tasks.push({
    title, day:parseInt(document.getElementById('new-day').value),
    pri:document.getElementById('new-pri').value,
    subject:document.getElementById('new-subject').value||'כללי', done:false
  });
  document.getElementById('new-title').value='';
  saveData(); buildWeekGrid(); renderTasks(); updatePace();
}

function doneTask(title,btn){
  playVictorySound();
  const t = tasks.find(x=>x.title===title);
  if(t) t.done=true;
  saveData(); document.getElementById('victory').classList.add('show');
  buildWeekGrid(); renderTasks(); updatePace();
}

function startTaskTimer(btn){
  const display=btn.closest('.task-timer').querySelector('[data-timer]');
  if(timerRunning&&activeTimer===display){ clearInterval(window._tInterval); timerRunning=false; btn.textContent='המשיכי'; return; }
  if(activeTimer&&activeTimer!==display){ clearInterval(window._tInterval); }
  activeTimer=display; timerSecs=timerSecs||25*60; timerRunning=true; btn.textContent='עצרי';
  window._tInterval=setInterval(()=>{
    timerSecs--;
    if(timerSecs<=0){ clearInterval(window._tInterval); timerRunning=false; btn.textContent='התחילי'; timerSecs=25*60; sendNotification("הטיימר הסתיים! ⏰", "סיימת 25 דקות של ריכוז מלא."); }
    display.textContent=`${Math.floor(timerSecs/60).toString().padStart(2,'0')}:${(timerSecs%60).toString().padStart(2,'0')}`;
  },1000);
}

function selectMusic(el,name){
  el.closest('.music-row').querySelectorAll('.m-chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('main-yt-player').src = ytLinks[name];
}

function sendChat(input, idx) {
  const v = input.value.trim();
  if (!v) return;

  const chat = document.getElementById('chat-' + idx);
  
  // הוספת ההודעה שלך למסך
  const me = document.createElement('div');
  me.className = 'chat-me';
  me.textContent = v;
  chat.appendChild(me);
  input.value = '';

  // התגובה שלי עם "כפתורי הקסם"
  setTimeout(() => {
    const reply = document.createElement('div');
    reply.className = 'chat-bubble';
    
    // ניקוי תווים מיוחדים כדי שהקישור לא יישבר
    const safeMsg = encodeURIComponent(v);
    
    reply.innerHTML = `
      <div style="margin-bottom:8px; font-weight:bold; color:var(--accent)">שאלה מצוינת! בואי נפתור אותה:</div>
      <div style="font-size:12px; margin-bottom:10px; color:var(--sub)">לחצי על הכפתור כדי לשלוח את השאלה ישירות ל-AI:</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap">
        <button class="btn" style="background:#4285f4; font-size:11px; padding:6px 12px" 
                onclick="window.open('https://gemini.google.com/app?q=' + '${safeMsg}', '_blank')">
          שאל את Gemini 🚀
        </button>
        <button class="btn" style="background:#10a37f; font-size:11px; padding:6px 12px" 
                onclick="window.open('https://chatgpt.com/?q=' + '${safeMsg}', '_blank')">
          שאל את GPT 🤖
        </button>
      </div>
    `;
    
    chat.appendChild(reply);
    chat.scrollTop = chat.scrollHeight;
  }, 600);
}

/* --- HELPERS --- */

function updatePace(){
  const total=tasks.length, done=tasks.filter(t=>t.done).length, urgent=tasks.filter(t=>t.pri==='red-b'&&!t.done).length;
  const pct=total>0?Math.round((done/total)*100):100;
  const bar=document.getElementById('pacebar'), txt=document.getElementById('pacetext');
  let color='#e74c3c', label='יש לחץ — בואי נתחיל!';
  if(urgent===0&&pct>=60){color='#2ecc71';label='מצוין! בקצב מושלם';}
  else if(urgent<=1&&pct>=30){color='#f39c12';label='בסדר, אפשר להאיץ';}
  bar.style.width=Math.max(10,pct)+'%'; bar.style.background=color; txt.style.color=color; txt.textContent=label;
}

function scheduleVideoSuggest(){
  setInterval(()=>{
    if(videoMins > 0){
      const cat = funVideoCategories[Math.floor(Math.random()*funVideoCategories.length)];
      const b=document.getElementById('video-b');
      b.querySelector('span').innerHTML=`<strong>${cat.label}:</strong> ${cat.msg}`;
      document.getElementById('video-actions').innerHTML=`
        <button class="banner-close" onclick="window.open('${cat.link}','_blank');startVideo(10)">צפי (10 דק')</button>
        <button class="banner-close" onclick="this.closest('.banner').classList.remove('show')">לא כעת</button>`;
      b.classList.add('show');
    }
  }, 3 * 60 * 60000); // Every 3 hours
}

function startVideo(mins){
  videoMins = Math.max(0, videoMins - mins); saveData(); updateVideoUI();
  document.getElementById('video-b').classList.remove('show');
}

function updateVideoUI(){
  document.getElementById('video-counter').textContent = videoMins <= 0 ? 'נגמר תקציב הסרטונים!' : `נשארו ${videoMins} דקות`;
}

function checkSleepLoop(){
  setInterval(()=>{
    const now=new Date(); if(now.getHours()===22 && now.getMinutes()===30) {
      document.getElementById('sleep-b').classList.add('show');
      sendNotification("זמן לישון! 🌙", "השעה 22:30. הגוף שלך צריך מנוחה.");
    }
  },60000);
}

function scheduleBreaks(){
  setTimeout(()=>{
    const b=document.getElementById('break-b'); b.classList.add('show');
    sendNotification("הפסקת התרעננות 💧", "קומי, תתמתחי ושתי כוס מים.");
    scheduleBreaks();
  }, 45 * 60000);
}

function getMusicOptions(sub){
  const all=['Lo-fi','Jazz','טבע','Classical','Focus'];
  const rec = (sub==='אינפי')?'Classical':'Lo-fi';
  return all.map(m=>`<div class="m-chip${m===rec?' on':''}" onclick="selectMusic(this,'${m}')">${m}</div>`).join('');
}

function playVictorySound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[523,.0],[659,.15],[784,.3],[1047,.45]].forEach(([f,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f; g.gain.setValueAtTime(.2,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.01,ctx.currentTime+t+.3);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.4);
    });
  }catch(e){}
}

function clearData(){ if(confirm("לאפס הכל?")) { try{localStorage.clear();}catch(e){} location.reload(); }}
function toggleTask(el){ el.nextElementSibling.classList.toggle('open'); el.closest('.task-card').classList.toggle('open'); }
function scrollToTask(t){ const cards=document.querySelectorAll('.task-card'); cards.forEach(c=>{if(c.querySelector('.tc-title').textContent===t)c.scrollIntoView({behavior:'smooth'});});}
function closeVictory(){ document.getElementById('victory').classList.remove('show'); }
function breakReply(){ document.getElementById('break-b').classList.remove('show'); }
function fileUploaded(input){ input.parentElement.querySelector('.upload-label').textContent = "קובץ עלה! ✅"; }

init();
</script>
